<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planilla de Matrícula - ENFA</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --azul-aduana: #245190;
    --rojo-aduana: #a62a25;
    --gris-claro: #f5f5f5;
    --gris-medio: #e0e0e0;
}
* { box-sizing: border-box; }
body { font-family: 'Roboto', Arial, sans-serif; max-width:900px; margin:0 auto; padding:20px; background:url('fondo.jpeg') center/cover no-repeat fixed; min-height:100vh; position:relative;}
body::before { content:""; position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(245,247,250,0.85); z-index:-1;}
.header { background:white; border-radius:10px; padding:25px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.1); border-top:5px solid var(--azul-aduana);}
.header-logos { display:flex; justify-content:center; align-items:center; gap:30px; margin-bottom:15px; flex-wrap:wrap;}
.logo { height:80px; width:auto;}
.header-text { text-align:center;}
h1 { color: var(--azul-aduana); font-size:24px; font-weight:700; margin:0;}
h2 { color: var(--rojo-aduana); font-size:18px; font-weight:500; margin:5px 0;}
.section { background: rgba(255,255,255,0.95); border-radius:10px; padding:20px; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.08);}
.section-title { color:white; background: linear-gradient(90deg,var(--azul-aduana),var(--rojo-aduana)); padding:10px 15px; font-weight:500; font-size:16px; border-radius:5px; margin:-20px -20px 15px -20px;}
.form-row { display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap;}
.form-group { flex:1; min-width:150px;}
.form-group label { display:block; font-size:13px; margin-bottom:5px; color:#555; font-weight:500;}
.form-group input, .form-group select, .form-group textarea { width:100%; padding:10px; border:1px solid var(--gris-medio); border-radius:5px; font-size:14px; transition:border-color 0.3s; background: rgba(255,255,255,0.9);}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color: var(--azul-aduana); box-shadow:0 0 0 2px rgba(0,42,108,0.1);}
textarea { min-height:60px; resize: vertical;}
.checkbox-group { display:flex; gap:20px; align-items:center; flex-wrap:wrap;}
.checkbox-group label { display:flex; align-items:center; gap:8px; font-size:14px; color:#555; cursor:pointer;}
.checkbox-group input[type="checkbox"] { width:18px; height:18px; accent-color: var(--azul-aduana);}
.full-width { width:100%;}
.half-width { width:48%;}
.print-btn { background: linear-gradient(90deg, var(--azul-aduana), var(--rojo-aduana)); color:white; padding:12px 30px; border:none; border-radius:25px; cursor:pointer; font-size:16px; font-weight:500; transition: transform 0.2s, box-shadow 0.2s;}
.print-btn:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,42,108,0.3);}
.input-error { border-color: red !important; }
@media print { body { background:white;} body::before { display:none;} .section, .header { box-shadow:none; border:1px solid #ccc;}}
@media (max-width:768px){ body{padding:10px;} .header{padding:15px;} .logo{height:60px;} h1{font-size:18px;} h2{font-size:15px;} .form-row{flex-direction:column;gap:10px;} .form-group{min-width:100%;} .half-width{width:100%;}}
@media (max-width:480px){ .header-logos{flex-direction:column; gap:10px;} h1{font-size:16px;} th, td{padding:6px 4px; font-size:12px;}}
</style>
</head>
<body>
<div class="header">
    <div class="header-logos">
        <img src="AGR.png" alt="Logo AGR" class="logo">
        <img src="ENFA.png" alt="Logo ENFA" class="logo">
    </div>
    <div class="header-text">
        <h1>ADUANA GENERAL DE LA REPUBLICA</h1>
        <h2>ESCUELA NACIONAL DE FORMACIÓN ADUANERA</h2>
        <h2>PLANILLA DE MATRICULA</h2>
    </div>
</div>

<form id="matriculaForm">

<!-- DATOS PERSONALES -->
<div class="section">
<div class="section-title">DATOS PERSONALES</div>
<div class="form-row">
<div class="form-group"><label>1er. Apellido</label><input type="text" name="primer_apellido" required></div>
<div class="form-group"><label>2do. Apellido</label><input type="text" name="segundo_apellido"></div>
<div class="form-group"><label>Nombres</label><input type="text" name="nombres" required></div>
</div>
<div class="form-row">
<div class="form-group"><label>No. Carné de Identidad o Pasaporte</label><input type="text" name="carne_identidad"></div>
<div class="form-group"><label>Sexo</label><select name="sexo"><option value="">Seleccionar</option><option value="M">Masculino</option><option value="F">Femenino</option></select></div>
<div class="form-group"><label>Color de la piel</label><input type="text" name="color_piel"></div>
</div>
<div class="form-row">
<div class="form-group full-width"><label>Dirección Particular</label><input type="text" name="direccion_particular"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Teléfono</label><input type="text" name="telefono"></div>
<div class="form-group"><label>Municipio</label><input type="text" name="municipio_personal"></div>
<div class="form-group"><label>Nivel de Escolaridad</label><input type="text" name="nivel_escolaridad"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Graduado de</label><input type="text" name="graduado_de"></div>
<div class="form-group"><label>Año de graduación</label><input type="number" name="año_graduacion"></div>
<div class="form-group"><label>Centro de estudio</label><input type="text" name="centro_estudio"></div>
<div class="form-group"><label>País</label><input type="text" name="pais"></div>
</div>
</div>

<!-- DATOS LABORALES -->
<div class="section">
<div class="section-title">DATOS LABORALES</div>
<div class="form-row"><div class="form-group full-width"><label>Centro de Trabajo</label><input type="text" name="centro_trabajo"></div></div>
<div class="form-row"><div class="form-group full-width"><label>Dirección Trabajo</label><input type="text" name="direccion_trabajo"></div></div>
<div class="form-row">
<div class="form-group"><label>Teléfono Trabajo</label><input type="text" name="telefono_trabajo"></div>
<div class="form-group"><label>Fax</label><input type="text" name="fax"></div>
<div class="form-group"><label>Email Trabajo</label><input type="email" name="email_trabajo"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Municipio Trabajo</label><input type="text" name="municipio_trabajo"></div>
<div class="form-group"><label>Provincia</label><input type="text" name="provincia"></div>
</div>
<div class="form-row"><div class="form-group full-width"><label>Empresa o Entidad</label><input type="text" name="empresa_entidad"></div></div>
<div class="form-row">
<div class="form-group"><label>Organismo</label><input type="text" name="organismo"></div>
<div class="form-group"><label>Cargo o labor que desempeña</label><input type="text" name="cargo"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Años de experiencia laboral</label><input type="number" name="años_experiencia"></div>
<div class="form-group"><label>Años de experiencia en la labor que realiza</label><input type="number" name="años_experiencia_cargo"></div>
</div>
<div class="form-row checkbox-group">
<label><input type="checkbox" name="cuadro_si"> Cuadro: Si</label>
<label><input type="checkbox" name="cuadro_no"> No</label>
<label><input type="checkbox" name="reserva_si"> Reserva de Cuadros: Si</label>
<label><input type="checkbox" name="reserva_no"> No</label>
</div>
<div class="form-row"><div class="form-group full-width"><label>Observaciones</label><textarea name="observaciones"></textarea></div></div>
</div>

<!-- OTROS DATOS -->
<div class="section">
<div class="section-title">OTROS DATOS</div>
<div class="form-row">
<div class="form-group"><label>Ubicación en la defensa</label><input type="text" name="defensa"></div>
<div class="form-group"><label>Organizaciones políticas y de masas</label><input type="text" name="organizaciones"></div>
<div class="form-group"><label>Fecha</label><input type="date" name="fecha_otros"></div>
</div>
</div>

<!-- DATOS DEL TITULO -->
<div class="section">
<div class="section-title">DATOS DEL TITULO</div>
<table>
<tr>
<th>CES</th><th>Folio</th><th>No</th><th>Facultad</th><th>Folio</th><th>No</th>
</tr>
<tr>
<td><input type="text" name="ces" style="width:100%"></td>
<td><input type="text" name="folio1" style="width:100%"></td>
<td><input type="text" name="no1" style="width:100%"></td>
<td><input type="text" name="facultad" style="width:100%"></td>
<td><input type="text" name="folio2" style="width:100%"></td>
<td><input type="text" name="no2" style="width:100%"></td>
</tr>
</table>

<div class="form-row">
<div class="form-group full-width">
<label>Adjuntar título de Licenciatura (imagen o PDF)</label>
<input type="file" name="archivo_titulo" id="archivo_titulo" accept=".pdf,.jpg,.jpeg,.png">
</div>
</div>
</div>

<!-- EMAIL PARA CREDENCIALES -->
<div class="section">
<div class="section-title">EMAIL PARA CREDENCIALES EVA</div>
<div class="form-row">
<div class="form-group full-width">
<label>Correo electrónico (recibirá sus credenciales):</label>
<input type="email" name="email_credenciales" placeholder="ejemplo@dominio.com" required>
</div>
</div>
</div>

<div style="text-align:center; margin-top:20px;">
<button type="submit" class="print-btn">Enviar Formulario</button>
<button type="button" class="print-btn" onclick="window.print()" style="background: linear-gradient(90deg,#666,#888);">Imprimir</button>
</div>
</form>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/TU_WEBAPP_ID/exec";

document.getElementById("matriculaForm").addEventListener("submit", function(event){
    event.preventDefault();
    const form = this;
    const btn = event.submitter;
    btn.textContent = "Enviando...";
    btn.disabled = true;

    const data = {};
    let errorCampos = false;

    form.querySelectorAll("input, select, textarea").forEach(el=>{
        if(el.name){
            if(el.type==="checkbox") data[el.name] = el.checked ? "Si" : "No";
            else data[el.name] = el.value.trim();
            if(el.hasAttribute("required") && !el.value.trim()){
                el.classList.add("input-error");
                errorCampos = true;
            } else el.classList.remove("input-error");
        }
    });

    if(errorCampos){
        alert("Por favor completa todos los campos obligatorios en rojo.");
        btn.textContent = "Enviar Formulario";
        btn.disabled = false;
        return;
    }

    const archivoInput = document.getElementById("archivo_titulo");
    if(archivoInput.files.length>0){
        const file = archivoInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e){
            data.archivo_titulo_nombre = file.name;
            data.archivo_titulo_base64 = e.target.result.split(",")[1];
            enviarDatos(data, form, btn);
        };
        reader.readAsDataURL(file);
    } else {
        enviarDatos(data, form, btn);
    }
});

async function enviarDatos(data, form, btn){
    let resumen = "Revise sus datos:\n\n";
    for(const key in data) resumen += `${key}: ${data[key]}\n`;
    if(!confirm(resumen)){
        btn.textContent = "Enviar Formulario";
        btn.disabled = false;
        return;
    }

    try{
        const res = await fetch(WEBAPP_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });
        const json = await res.json();
        if(json.result==="success"){
            alert("Formulario enviado correctamente. Recibirá sus credenciales en su correo.");
            form.reset();
        } else alert("Error al enviar: "+(json.error||"Desconocido"));
    } catch(err){
        alert("Error al enviar. Intente nuevamente. "+err);
    } finally{
        btn.textContent = "Enviar Formulario";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
